name: CI-CD to ECR and EKS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin 428613119876.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker Image
        run: docker build -t my-app .

      - name: Tag Image
        run: docker tag my-app:latest 428613119876.dkr.ecr.$AWS_REGION.amazonaws.com/my-app:latest

      - name: Push to ECR
        run: docker push 428613119876.dkr.ecr.$AWS_REGION.amazonaws.com/my-app:latest